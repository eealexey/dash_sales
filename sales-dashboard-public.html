<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nexus DC — Sales Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0d14;--bg2:#0f1420;--surface:#131928;--surface2:#1a2235;--surface3:#1f2840;
  --border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.1);
  --text:#e8ecf4;--text2:#9aa5bc;--muted:#5c6780;
  --blue:#3d7fff;--blue2:#2563eb;--blue-glow:rgba(61,127,255,.15);
  --green:#22c55e;--green-dim:rgba(34,197,94,.12);
  --amber:#f59e0b;--amber-dim:rgba(245,158,11,.12);
  --red:#ef4444;--red-dim:rgba(239,68,68,.12);
  --cyan:#06b6d4;--cyan-dim:rgba(6,182,212,.12);
  --purple:#a855f7;--purple-dim:rgba(168,85,247,.12);
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;min-height:100vh}

/* NAV */
.nav{position:sticky;top:0;z-index:100;background:rgba(10,13,20,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;gap:8px;height:52px}
.nav-brand{font-weight:700;font-size:15px;color:var(--text);margin-right:auto;display:flex;align-items:center;gap:8px}
.nav-brand span{color:var(--blue)}
.nav-tab{padding:6px 14px;border-radius:8px;border:none;background:transparent;color:var(--text2);cursor:pointer;font-size:13px;font-family:'Inter',sans-serif;transition:.15s;font-weight:500}
.nav-tab:hover{background:var(--surface2);color:var(--text)}
.nav-tab.active{background:var(--blue2);color:#fff}

/* LAYOUT */
.page{display:none;padding:24px;max-width:1400px;margin:0 auto}
.page.active{display:block}

/* METRICS GRID */
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 20px;position:relative;overflow:hidden}
.metric::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.metric.blue::before{background:linear-gradient(90deg,var(--blue),var(--cyan))}
.metric.green::before{background:linear-gradient(90deg,var(--green),#86efac)}
.metric.amber::before{background:linear-gradient(90deg,var(--amber),#fde68a)}
.metric.purple::before{background:linear-gradient(90deg,var(--purple),#d8b4fe)}
.metric.red::before{background:linear-gradient(90deg,var(--red),#fca5a5)}
.metric-val{font-size:32px;font-weight:800;line-height:1;margin-bottom:4px}
.metric.blue .metric-val{color:var(--blue)}
.metric.green .metric-val{color:var(--green)}
.metric.amber .metric-val{color:var(--amber)}
.metric.purple .metric-val{color:var(--purple)}
.metric.red .metric-val{color:var(--red)}
.metric-label{font-size:12px;color:var(--text2);font-weight:500}
.metric-sub{font-size:11px;color:var(--muted);margin-top:2px}

/* FUNNEL */
.funnel-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:24px}
.funnel-title{font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:16px}
.funnel-stages{display:flex;align-items:stretch;gap:0}
.funnel-stage{flex:1;display:flex;flex-direction:column;align-items:center;position:relative}
.funnel-stage:not(:last-child)::after{content:'';position:absolute;right:-1px;top:50%;transform:translateY(-50%);width:0;height:0;border-top:18px solid transparent;border-bottom:18px solid transparent;border-left:14px solid var(--bg);z-index:2}
.fs-bar{width:100%;border-radius:6px 0 0 6px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:14px 8px;gap:4px;position:relative}
.funnel-stage:last-child .fs-bar{border-radius:6px}
.funnel-stage:first-child .fs-bar{border-radius:6px 0 0 6px}
.fs-count{font-size:24px;font-weight:800;color:#fff}
.fs-label{font-size:11px;font-weight:600;color:rgba(255,255,255,.7);text-align:center;line-height:1.2}
.fs-pct{font-size:10px;color:rgba(255,255,255,.5);margin-top:2px}
.fs-arrow{display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:18px;padding:0 4px;flex-shrink:0;align-self:center}

/* CHARTS ROW */
.charts-row{display:grid;grid-template-columns:1.8fr 1fr;gap:12px;margin-bottom:24px}
.hero-row{display:grid;grid-template-columns:2fr 1fr;gap:12px;margin-bottom:24px}
.hot-deals{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;overflow:hidden;position:relative}
.hot-deals::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#ef4444,#f59e0b,#a855f7)}
.hd-title{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.hd-title h3{font-size:14px;font-weight:700}
.hd-title .pulse{width:8px;height:8px;border-radius:50%;background:var(--red);box-shadow:0 0 0 0 rgba(239,68,68,.7);animation:pulse 2s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(239,68,68,.7)}70%{box-shadow:0 0 0 8px rgba(239,68,68,0)}100%{box-shadow:0 0 0 0 rgba(239,68,68,0)}}
.hd-list{display:flex;flex-direction:column;gap:8px;max-height:340px;overflow-y:auto}
.hd-item{display:flex;align-items:center;gap:12px;padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:.15s}
.hd-item:hover{border-color:var(--amber);background:var(--surface3);transform:translateX(2px)}
.hd-rank{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;background:var(--amber-dim);color:var(--amber)}
.hd-item:nth-child(1) .hd-rank{background:rgba(239,68,68,.2);color:var(--red)}
.hd-item:nth-child(2) .hd-rank{background:rgba(245,158,11,.2);color:var(--amber)}
.hd-item:nth-child(3) .hd-rank{background:rgba(168,85,247,.2);color:var(--purple)}
.hd-info{flex:1;min-width:0}
.hd-company{font-weight:600;font-size:13px;margin-bottom:2px}
.hd-meta{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hd-score{text-align:right;flex-shrink:0}
.hd-score-val{font-size:16px;font-weight:800;color:var(--green);line-height:1}
.hd-score-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}

/* NEXT ACTIONS */
.next-actions{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px}
.na-title{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.na-title h3{font-size:14px;font-weight:700}
.na-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.na-item:last-child{border-bottom:none}
.na-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.na-content{flex:1;min-width:0}
.na-action{font-size:12px;font-weight:600;color:var(--text);margin-bottom:2px}
.na-detail{font-size:11px;color:var(--text2);line-height:1.4}
.na-count{background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:2px 8px;font-size:11px;font-weight:600;color:var(--text2);flex-shrink:0}

/* GEO / REGIONS */
.geo-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}
.geo-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;position:relative;overflow:hidden;cursor:pointer;transition:.15s}
.geo-card:hover{border-color:var(--border2);background:var(--surface3)}
.geo-flag{font-size:18px;margin-bottom:4px;display:block}
.geo-count{font-size:22px;font-weight:800;line-height:1;margin-bottom:2px}
.geo-label{font-size:11px;color:var(--text2);font-weight:500}
.geo-bar{position:absolute;bottom:0;left:0;height:2px;background:linear-gradient(90deg,var(--blue),var(--cyan))}

/* COMMIT BAR */
.commit-bar{display:flex;gap:4px;height:32px;border-radius:8px;overflow:hidden;margin-top:14px;border:1px solid var(--border)}
.commit-seg{display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;transition:.2s}
.commit-seg:hover{opacity:.85;transform:scaleY(1.05)}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px}
.chart-card-title{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:16px}
canvas{width:100%!important}

/* SEARCH & FILTERS */
.controls{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.search-wrap{position:relative;flex:1;min-width:200px}
.search-wrap input{width:100%;background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:8px 12px 8px 36px;color:var(--text);font-size:13px;font-family:'Inter',sans-serif;outline:none;transition:.15s}
.search-wrap input:focus{border-color:var(--blue);background:var(--surface2)}
.search-wrap input::placeholder{color:var(--muted)}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
.filter-btn{padding:7px 14px;border-radius:8px;border:1px solid var(--border2);background:var(--surface);color:var(--text2);cursor:pointer;font-size:12px;font-weight:500;font-family:'Inter',sans-serif;transition:.15s}
.filter-btn:hover{border-color:var(--border2);background:var(--surface2);color:var(--text)}
.filter-btn.active{background:var(--blue2);border-color:var(--blue2);color:#fff}
.count-badge{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:12px;color:var(--text2);margin-left:auto}

/* TABLE */
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
table{width:100%;border-collapse:collapse}
thead tr{background:var(--surface2);border-bottom:1px solid var(--border2)}
th{padding:10px 14px;text-align:left;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
tbody tr{border-bottom:1px solid var(--border);transition:.12s;cursor:pointer}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--surface2)}
td{padding:10px 14px;font-size:13px;vertical-align:middle}
.td-company{font-weight:600;color:var(--text);max-width:200px}
.td-company a{color:var(--blue);text-decoration:none;font-size:11px;display:block;font-weight:400;margin-top:2px}
.td-company a:hover{text-decoration:underline}
.td-name{color:var(--text2);font-size:12px;max-width:160px}
.td-about{color:var(--muted);font-size:12px;max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* STATUS BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:5px;font-size:11px;font-weight:600;white-space:nowrap}
.badge-yes{background:var(--green-dim);color:var(--green)}
.badge-no{background:rgba(255,255,255,.04);color:var(--muted)}
.badge-meeting{background:var(--blue-glow);color:var(--blue)}
.stage-chip{padding:3px 8px;border-radius:5px;font-size:11px;font-weight:600}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:16px;max-width:560px;width:100%;max-height:80vh;overflow-y:auto}
.modal-header{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start}
.modal-company{font-size:18px;font-weight:700}
.modal-role{font-size:13px;color:var(--text2);margin-top:3px}
.modal-close{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text2);cursor:pointer;font-size:18px;padding:4px 10px;line-height:1}
.modal-body{padding:20px 24px}
.modal-row{display:flex;gap:12px;margin-bottom:12px;align-items:flex-start}
.modal-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px}
.modal-field{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:3px}
.modal-value{font-size:13px;color:var(--text)}
.modal-summary{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px;font-size:13px;color:var(--text2);line-height:1.6;margin-top:8px}
.modal-summary-title{font-size:11px;font-weight:600;color:var(--amber);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.pipeline-stages{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.ps{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600}
.ps.done{background:var(--green-dim);color:var(--green)}
.ps.todo{background:rgba(255,255,255,.04);color:var(--muted);text-decoration:line-through}

/* MEETINGS PAGE */
.meetings-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
.meeting-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;transition:.15s;cursor:pointer}
.meeting-card:hover{border-color:var(--border2);background:var(--surface2)}
.mc-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.mc-company{font-size:15px;font-weight:700}
.mc-role{font-size:12px;color:var(--text2);margin-top:2px}
.mc-summary{font-size:13px;color:var(--text2);line-height:1.6;border-left:3px solid var(--blue);padding-left:12px;margin-top:10px}
.mc-tags{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}

/* SECTION TITLES */
.section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text2);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* PRIORITY FLAG */
.priority-dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
.p-hot{background:var(--red)}
.p-warm{background:var(--amber)}
.p-cold{background:var(--muted)}

/* RESPONSIVE */
@media(max-width:768px){
  .charts-row{grid-template-columns:1fr}
  .metrics{grid-template-columns:repeat(2,1fr)}
  .page{padding:16px}
  th:nth-child(n+5){display:none}
  td:nth-child(n+5){display:none}
}
</style>
</head>

<nav class="nav">
  <div class="nav-brand">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><rect width="20" height="20" rx="5" fill="#3d7fff"/><path d="M5 10h10M10 5v10" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg>

</div>

<!-- PIPELINE -->
<div id="page-pipeline" class="page">

</div>

<!-- LEADS -->
<div id="page-leads" class="page">
  <div class="controls">
    <div class="search-wrap">
      <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>

    <button class="filter-btn" onclick="setFilter('hot',this)">🔥 Встречи</button>
    <button class="filter-btn" onclick="setFilter('replied',this)">✉️ Ответили</button>
    <button class="filter-btn" onclick="setFilter('cold',this)">❄️ Без ответа</button>
    <span class="count-badge" id="leads-count"></span>
  </div>
  <div class="table-wrap">
    <table id="leads-table">
      <thead><tr>
        <th>Компания</th>
        <th>Контакт</th>
        <th>Кратко</th>
        <th>Письмо</th>
        <th>Ответ</th>
        <th>Фоллоуап</th>
        <th>Встреча</th>
      </tr></thead>
      <tbody id="leads-body"></tbody>
    </table>
  </div>
</div>

<!-- MEETINGS -->
<div id="page-meetings" class="page">
  <div class="section-title">Проведено встреч · <span style="color:var(--green)">22</span></div>
  <div class="meetings-grid" id="meetings-grid"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal" id="modal-content"></div>
</div>

// --- HOT DEALS ---
// Score = meeting(5) + followup(2) + replied(1) + summary_length_bonus + money_signal
function scoreLead(r) {
  let s = 0;
  if (r.meeting) s += 50;
  if (r.followup) s += 20;
  if (r.replied) s += 10;
  if (r.summary) s += 5;
  // money signals from summary
  const text = (r.summary || '').toLowerCase();
  if (/пилот|pilot|кп|loi|бюджет|budget|commit|сделк/i.test(text)) s += 15;
  if (/\$|€|руб|k\s*dev|₽/.test(text)) s += 10;
  if (/предложени|offer|proposal/i.test(text)) s += 8;
  return s;
}

function dealStage(r) {
  if (r.meeting && r.summary) {
    const t = r.summary.toLowerCase();
    if (/пилот|pilot|кп|loi|предложени|offer/i.test(t)) return {label:'Ждём КП / пилот', color:'#ef4444'};
    if (/цен|pricing|бюджет|budget/i.test(t)) return {label:'Обсуждение цены', color:'#f59e0b'};
    return {label:'После встречи', color:'#a855f7'};
  }
  if (r.meeting) return {label:'Встреча проведена', color:'#a855f7'};
  if (r.followup) return {label:'В активном диалоге', color:'#f59e0b'};
  return {label:'Новый контакт', color:'#5c6780'};
}

const hotLeads = [...LEADS].sort((a,b) => scoreLead(b) - scoreLead(a)).slice(0, 8);

hdEl.innerHTML = hotLeads.map((r, i) => {

}).join('');

  filtered = LEADS.filter(r => {
    const matchSearch = !search || r.company.toLowerCase().includes(search) ||
      (r.name||'').toLowerCase().includes(search) || (r.role_ru||'').toLowerCase().includes(search);
    const matchFilter =
      currentFilter === 'all' ? true :
      currentFilter === 'hot' ? r.meeting :
      currentFilter === 'replied' ? r.replied :
      currentFilter === 'cold' ? !r.replied : true;
    return matchSearch && matchFilter;
  });

  document.getElementById('leads-count').textContent = filtered.length + ' компаний';

  tbody.innerHTML = filtered.map((r, i) => {
    const stage = getStage(r);
    const idx = LEADS.indexOf(r);
    return `<tr onclick="openModal(${idx})">
      <td class="td-company">${r.company}${r.site ? `<a href="${r.site}" target="_blank" onclick="event.stopPropagation()">${r.site.replace(/https?:\/\//,'').split('/')[0]}</a>` : ''}</td>
      <td class="td-name">${r.name || '—'}<br><span style="color:var(--muted);font-size:11px">${r.role_ru||''}</span></td>
      <td class="td-about">${r.about||''}</td>
      <td>${r.letter ? '<span class="badge badge-yes">✓</span>' : '<span class="badge badge-no">—</span>'}</td>
      <td>${r.replied ? '<span class="badge badge-yes">✓</span>' : '<span class="badge badge-no">—</span>'}</td>
      <td>${r.followup ? '<span class="badge badge-yes">✓</span>' : '<span class="badge badge-no">—</span>'}</td>
      <td>${r.meeting ? '<span class="badge badge-meeting">✓</span>' : '<span class="badge badge-no">—</span>'}</td>
    </tr>`;
  }).join('');
}

function filterLeads() { renderLeads(); }
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderLeads();
}

renderLeads();

// --- MEETINGS GRID ---
const meetingsGrid = document.getElementById('meetings-grid');
const meetingLeads = LEADS.filter(r => r.meeting);
meetingsGrid.innerHTML = meetingLeads.map(r => {
  const idx = LEADS.indexOf(r);
  return `<div class="meeting-card" onclick="openModal(${idx})">
    <div class="mc-header">
      <div>
        <div class="mc-company">${r.company}</div>
        <div class="mc-role">${r.name ? r.name + (r.role_ru ? ' · ' + r.role_ru : '') : r.role_ru || ''}</div>
      </div>
      <span class="badge badge-meeting">Встреча</span>
    </div>
    ${r.summary ? `<div class="mc-summary">${r.summary}</div>` : ''}
    <div class="mc-tags">
      ${r.followup ? '<span class="badge badge-yes">Фоллоуап</span>' : ''}
      ${r.replied ? '<span class="badge" style="background:var(--green-dim);color:var(--green)">Ответ</span>' : ''}
    </div>
  </div>`;
}).join('');

// --- MODAL ---
function openModal(idx) {
  const r = LEADS[idx];
  const stages = [
    {label: 'Письмо', done: r.letter},
    {label: 'Ответ', done: r.replied},
    {label: 'Фоллоуап', done: r.followup},
    {label: 'Встреча', done: r.meeting},
  ];
  document.getElementById('modal-content').innerHTML = `
    <div class="modal-header">
      <div>
        <div class="modal-company">${r.company}</div>
        <div class="modal-role">${r.name ? r.name + (r.role_ru ? ' · ' + r.role_ru : '') : ''}</div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-row">
        <div class="modal-icon" style="background:var(--blue-glow)">🏢</div>
        <div><div class="modal-field">О компании</div><div class="modal-value">${r.about || '—'}</div></div>
      </div>
      ${r.site ? `<div class="modal-row">
        <div class="modal-icon" style="background:var(--cyan-dim)">🔗</div>
        <div><div class="modal-field">Сайт</div><div class="modal-value"><a href="${r.site}" target="_blank" style="color:var(--blue)">${r.site}</a></div></div>
      </div>` : ''}
      ${r.linkedin ? `<div class="modal-row">
        <div class="modal-icon" style="background:var(--blue-glow)">💼</div>
        <div><div class="modal-field">LinkedIn</div><div class="modal-value"><a href="${r.linkedin}" target="_blank" style="color:var(--blue)">${r.name || 'Открыть'}</a></div></div>
      </div>` : ''}
      <div class="modal-row">
        <div class="modal-icon" style="background:var(--green-dim)">📍</div>
        <div>
          <div class="modal-field">Этапы воронки</div>
          <div class="pipeline-stages">
            ${stages.map(s => `<span class="ps ${s.done ? 'done' : 'todo'}">${s.done ? '✓' : '○'} ${s.label}</span>`).join('')}
          </div>
        </div>
      </div>
      ${r.summary ? `<div>
        <div class="modal-summary">
          <div class="modal-summary-title">📋 Саммари встречи</div>
          ${r.summary}
        </div>
      </div>` : ''}
    </div>`;
  document.getElementById('modal').classList.add('open');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modal')) {
    document.getElementById('modal').classList.remove('open');
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>
</body>
</html>
